<!-- page.html — Default static page template.
     Shows title in a branded page header, then the page's block content.
     For pages that need a different layout, assign page-wide or page-no-title
     from the Page editor → Template panel. -->

<!-- wp:template-part {"slug":"header","tagName":"header"} /-->

<!-- wp:template-part {"slug":"breadcrumbs","tagName":"div"} /-->

<!-- wp:group {"tagName":"main","anchor":"main-content","style":{"spacing":{"padding":{"top":"var:preset|spacing|20","bottom":"var:preset|spacing|24"}}},"layout":{"type":"constrained"}} -->
<main class="wp-block-group" id="main-content" style="padding-top:var(--wp--preset--spacing--20);padding-bottom:var(--wp--preset--spacing--24)">

	<!-- Page header: eyebrow (post-terms if page uses categories), title, separator -->
	<!-- wp:group {"style":{"spacing":{"margin":{"bottom":"var:preset|spacing|12"}}},"layout":{"type":"constrained"}} -->
	<div class="wp-block-group" style="margin-bottom:var(--wp--preset--spacing--12)">

		<!-- wp:post-title {"fontSize":"4xl","style":{"typography":{"lineHeight":"1.1"},"spacing":{"margin":{"top":"0","bottom":"var:preset|spacing|6"}}}} /-->

		<!-- wp:separator {"backgroundColor":"accent","style":{"layout":{"selfStretch":"fixed","flexSize":"3rem"},"spacing":{"margin":{"top":"0"}}}} -->
		<hr class="wp-block-separator has-text-color has-accent-color has-accent-background-color has-background" style="margin-top:0"/>
		<!-- /wp:separator -->

	</div>
	<!-- /wp:group -->

	<!-- Page content — constrained layout (720px reading width by default) -->
	<!-- wp:post-content {"layout":{"type":"constrained"}} /-->

	<!-- Comments — shown when comments are open on the page -->
	<!-- wp:post-comments-form /-->

</main>
<!-- /wp:group -->
